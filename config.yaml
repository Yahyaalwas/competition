# Time Series Forecasting Configuration

# Data settings
data:
  date_column: "date"
  value_column: "value"
  missing_value_strategy: "interpolate"  # interpolate, drop, or ffill

# Backtesting settings
backtesting:
  min_train_size: 24  # Minimum training observations for monthly data
  min_train_size_yearly: 10  # Minimum for yearly data
  n_folds: 3  # Number of cross-validation folds
  gap: 0  # Gap between train and test (useful for avoiding lookahead)

# Metrics
metrics:
  primary: "smape"  # Primary metric for model selection
  secondary: "rmse"  # Secondary metric (tiebreaker)
  all: ["mae", "rmse", "mape", "smape"]

# Model configurations
models:
  # Baseline models
  baselines:
    moving_average_window: 3
    seasonal_naive_period_monthly: 12
    seasonal_naive_period_yearly: 1

  # ARIMA/SARIMAX
  arima:
    auto_order: true
    max_p: 5
    max_d: 2
    max_q: 5
    seasonal: true
    seasonal_period_monthly: 12
    seasonal_period_yearly: 1
    max_P: 2
    max_D: 1
    max_Q: 2

  # LightGBM
  ml:
    n_lags: 12  # Number of lag features
    n_lags_yearly: 3  # For yearly data
    rolling_windows: [3, 6, 12]  # Rolling statistics windows
    rolling_windows_yearly: [2, 3]
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
    num_leaves: 31
    min_child_samples: 5
    quantiles: [0.1, 0.5, 0.9]  # For prediction intervals

# Prediction intervals
prediction_intervals:
  confidence_level: 0.80  # 80% prediction interval
  alpha: 0.2  # 1 - confidence_level

# Plotting
plotting:
  figure_width: 12
  figure_height: 6
  style: "seaborn-v0_8-whitegrid"
  forecast_color: "#1f77b4"
  historical_color: "#2ca02c"
  interval_color: "#1f77b4"
  interval_alpha: 0.2

# Output
output:
  save_plots: true
  save_model: true
  save_forecasts: true
  save_report: true
  decimal_places: 2

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
